config:
  azure-native:subscriptionId: 
  azure-native:location: eastus
  csharp-defaultapp:tags:
    application-id: OneBank
    data-classification: Restricted
    environment: dev
    provisioner: Pulumi
    technical-owner: TeamLvX
  csharp-defaultapp:location: westus3
  csharp-defaultapp:resourceGroupName: TeamLvX_rg
  csharp-defaultapp:componentType: webapp
  csharp-defaultapp:private: "false"
  csharp-defaultapp:applicationName: bookstore
  csharp-defaultapp:applicationId: onebank
  csharp-defaultapp:imageName:
  csharp-defaultapp:imageVersion: 
  
  csharp-defaultapp:repositoryUrl: "https://github.com/pSharpX/dashboard-catalogo-sismico-igp.git"
  csharp-defaultapp:branch: main
  csharp-defaultapp:runtime: "PYTHON|3.12"
  csharp-defaultapp:startupCommandLine: "streamlit run streamlit_app.py --server.headless true --browser.gatherUsageStats false  --server.port $PORT --server.address 0.0.0.0"
  
  csharp-defaultapp:port: 80
  csharp-defaultapp:totalCpu: "0.5"
  csharp-defaultapp:totalMemory: "1.0Gi"
  csharp-defaultapp:external: "true"
  csharp-defaultapp:enableScaling: "false"
  csharp-defaultapp:minInstances: 1
  csharp-defaultapp:maxInstances: 1
  csharp-defaultapp:vnetConfig:
    name: ""
    subnetId: ""
    addressPrefixes:
      - "10.1.0.0/16"
    subnets:
      - name: "private-a"
        tags: 
          - "private"
        alias: "cluster"
        addressPrefixes: 
          - "10.1.1.0/24"
        delegations:
          - name: "app-environment"
            serviceName: "Microsoft.App/environments"
      - name: "private-b"
        alias: "database"
        tags:
          - "private"
        addressPrefixes:
          - "10.1.5.0/24"
        delegations:
          - name: "sql-managed-instances"
            serviceName: "Microsoft.Sql/managedInstances"
      - name: "private-c"
        alias: "storage"
        tags:
          - "private"
        addressPrefixes:
          - "10.1.6.0/24"
      - name: "public-a"
        alias: "gateway-ingress"
        tags:
          - "public"
        addressPrefixes:
          - "10.1.10.0/24"
          - "10.1.11.0/24"
      - name: "private-d"
        alias: "private-endpoint"
        tags:
          - "private"
        addressPrefixes:
          - "10.1.7.0/24"
  csharp-defaultapp:secrets:
    - ["name1", "alias1", "value1"]
    - ["name2", "alias2", "value2"]
  csharp-defaultapp:appConfig:
    - [ "name1", "alias1", "value1" ]
    - [ "name2", "alias2", "value2" ]
  csharp-defaultapp:appSettings:
    - [ "SPRING_PROFILES_ACTIVE", "dev" ]
    - [ "CONTROL_PLANE_DATABASE_ENABLED", "false" ]
    - [ "CONTROL_PLANE_CACHE_ENABLED", "false" ]
    - [ "CONTROL_PLANE_NOTIFICATION_ENABLED", "false" ]
    - [ "MANAGEMENT_HEALTH_REDIS_ENABLED", "false" ]
  #  - [ "WEBSITES_PORT", "8080" ]
  csharp-defaultapp:enableProbes: "true"
  csharp-defaultapp:enableStorage: false
  csharp-defaultapp:storageAccountName:
  csharp-defaultapp:enableVault: false
  csharp-defaultapp:vaultName:
  csharp-defaultapp:enableConfigStore: false
  csharp-defaultapp:configStoreName:  
  csharp-defaultapp:enableRegistry: false
  csharp-defaultapp:registryName:
  csharp-defaultapp:enableEncryption: false
  csharp-defaultapp:encryptionKeyName:
  csharp-defaultapp:enableDatabase: false
  csharp-defaultapp:databaseConfig:
    databaseName: "bookstore-db"
    username: "onebank-user"
    password: "onebank-password"
    


