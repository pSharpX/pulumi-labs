name: csharp-defaultapp
description: A minimal csharp application to deploy app container resource on azure
runtime: dotnet
config:
  pulumi:tags:
    value:
      pulumi:template: csharp
  csharp-defaultapp:location:
    type: string
    description: Zone or location
  csharp-defaultapp:environment:
    type: string
    description: infrastructure environment
    default: dev
  csharp-defaultapp:resourceGroupName:
    type: string
    description: Name of the resource group
  csharp-defaultapp:private:
    type: boolean
    description: Indicates if managed environment is private
  csharp-defaultapp:applicationName:
    type: string
    description: Application group name
  csharp-defaultapp:applicationId:
    type: string
    description: Application ID to be use as subfix
  csharp-defaultapp:imageName:
    type: string
    description: Docker image name
  csharp-defaultapp:imageVersion:
    type: string
    description: Version of the docker image
    default: latest
  csharp-defaultapp:port:
    type: integer
    description: The port on which the application is listening.
    default: 80
  csharp-defaultapp:totalCpu:
    type: string
    description: The total cpu to allocate for container app.
  csharp-defaultapp:totalMemory:
    type: string
    description: The total memory to allocate for container app.
  csharp-defaultapp:external:
    type: boolean
    description: Indicates if application expose external endpoint.
    default: true
  csharp-defaultapp:enableScaling:
    type: boolean
    description: Indicates if scaling feature is enabled for container application.
    default: false
  csharp-defaultapp:minInstances:
    type: integer
    description: Indicates the minimum number of replicas of your application.
    default: 1
  csharp-defaultapp:maxInstances:
    type: integer
    description: Indicates the maximum number of replicas of your application.
    default: 1
  csharp-defaultapp:allowedOrigins:
    type: array
    description: Specifies the content for the access-control-allow-origins header.
    items: 
      type: string
    default: 
      - "*"
  csharp-defaultapp:allowedHeaders:
    type: array
    description: Specifies the content for the access-control-allow-headers header.
    items:
      type: string
    default:
      - "*"
  csharp-defaultapp:allowedMethods:
    type: array
    description: Specifies the content for the access-control-allow-methods header.
    items:
      type: string
    default:
      - "*"
  csharp-defaultapp:enableProbes:
    type: boolean
    description: Indicates if heath check should be performed
    default: false
  csharp-defaultapp:path:
    type: string
    description: Path to access on the HTTP server.
    default: "/"
  csharp-defaultapp:initialDelaySeconds:
    type: integer
    description: Number of seconds after the container has started before liveness probes are initiated. Minimum value is 1. Maximum value is 60.
    default: 3
  csharp-defaultapp:periodSeconds:
    type: integer
    description: How often (in seconds) to perform the probe. Default to 10 seconds. Minimum value is 1. Maximum value is 240.
    default: 3
  csharp-defaultapp:enableStorage:
    type: boolean
    description: Specifies whether to enable storage-account integration. A new storage-account resource is created if storageAccountName is not supplied. If neither is specified, a validation error is raised.
    default: true
  csharp-defaultapp:storageAccountName:
    type: string
    description: Indicates an existing storage-account name to use.
  csharp-defaultapp:enableVault:
    type: boolean
    description: Specifies whether to enable key-vault integration. A new key-vault resource is created if vaultName is not supplied. If neither is specified, a validation error is raised.
    default: true
  csharp-defaultapp:vaultName:
    type: string
    description: Indicates an existing vault name to use.
  csharp-defaultapp:enableConfigStore:
    type: boolean
    description: Specifies whether to enable configuration-store integration. A new configuration-store resource is created if configStoreName is not supplied. If neither is specified, a validation error is raised.
    default: true
  csharp-defaultapp:configStoreName:
    type: string
    description: Indicates an existing configuration-store name to use.
  csharp-defaultapp:enableRegistry:
    type: boolean
    description: Specifies whether to enable container-registry integration. A new container-registry resource is created if registryName is not supplied. If neither is specified, a validation error is raised.
    default: true
  csharp-defaultapp:registryName:
    type: string
    description: Indicates an existing container-registry name to use.
  csharp-defaultapp:enableEncryption:
    type: boolean
    description: Specifies whether to enable encryption in all integrations. A new key resource is created if keyName is not supplied. If neither is specified, a validation error is raised.
    default: true
  csharp-defaultapp:encryptionKeyName:
    type: string
    description: Indicates an existing key name to use.
  csharp-defaultapp:enableDatabase:
    type: boolean
    description: Determine whether database integration is enabled. A new server & database resources are created if it's enabled and database credentials are provided.
    default: false
  csharp-defaultapp:databaseEngine:
    type: string
    description: Determine which database engine will be used if database integration is enabled.
    default: mssql
